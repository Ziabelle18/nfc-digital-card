    // CUSTOM TOAST NOTIFICATION FUNCTION
    function showToast(message, isError = false, title = "Success") {
      const toast = document.getElementById('toastNotification');
      const toastIcon = document.getElementById('toastIcon');
      const toastTitle = document.getElementById('toastTitle');
      const toastMsg = document.getElementById('toastMessage');

      toastTitle.innerText = title;
      toastMsg.innerText = message;

      if (isError) {
        toastIcon.className = "w-8 h-8 rounded-full bg-red-500/20 text-red-400 flex items-center justify-center text-sm";
        toastIcon.innerHTML = '<i class="fa-solid fa-xmark"></i>';
      } else {
        toastIcon.className = "w-8 h-8 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center text-sm";
        toastIcon.innerHTML = '<i class="fa-solid fa-check"></i>';
      }

      toast.classList.remove('hidden');
      setTimeout(() => {
        toast.classList.remove('-translate-y-10', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');
      }, 10);

      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-10', 'opacity-0');
        setTimeout(() => toast.classList.add('hidden'), 500);
      }, 3000);
    }

    function fixUrl(url) {
      if (!url || url.trim() === '') return '#';
      let cleanUrl = url.trim();
      if (!cleanUrl.startsWith('http://') && !cleanUrl.startsWith('https://')) {
        cleanUrl = 'https://' + cleanUrl;
      }
      return cleanUrl;
    }

    function hexToRgb(hex) {
      hex = hex.replace('#', '');
      if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
      const bigint = parseInt(hex, 16);
      return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
    }

    function rgbToHex(r, g, b) {
      return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
    }

    function applyDynamicCustomColor(hex) {
      if (!hex) return;
      const rgb = hexToRgb(hex);
      const root = document.documentElement;

      const bgBody = `rgb(${Math.round(245 + rgb.r * 0.04)}, ${Math.round(245 + rgb.g * 0.04)}, ${Math.round(245 + rgb.b * 0.04)})`;
      const bgCard = `rgb(${Math.round(235 + rgb.r * 0.08)}, ${Math.round(235 + rgb.g * 0.08)}, ${Math.round(235 + rgb.b * 0.08)})`;
      const secBtnBg = `rgb(${Math.round(220 + rgb.r * 0.12)}, ${Math.round(220 + rgb.g * 0.12)}, ${Math.round(220 + rgb.b * 0.12)})`;
      const cardBorder = `rgb(${Math.round(210 + rgb.r * 0.15)}, ${Math.round(210 + rgb.g * 0.15)}, ${Math.round(210 + rgb.b * 0.15)})`;

      root.style.setProperty('--bg-body', bgBody);
      root.style.setProperty('--bg-card', bgCard);
      root.style.setProperty('--text-main', `rgb(${Math.round(rgb.r * 0.35)}, ${Math.round(rgb.g * 0.35)}, ${Math.round(rgb.b * 0.35)})`);
      root.style.setProperty('--text-sub', `rgb(${Math.round(rgb.r * 0.5)}, ${Math.round(rgb.g * 0.5)}, ${Math.round(rgb.b * 0.5)})`);
      root.style.setProperty('--accent-btn', hex);
      root.style.setProperty('--accent-text', '#ffffff');
      root.style.setProperty('--sec-btn-bg', secBtnBg);
      root.style.setProperty('--sec-btn-text', `rgb(${Math.round(rgb.r * 0.35)}, ${Math.round(rgb.g * 0.35)}, ${Math.round(rgb.b * 0.35)})`);
      root.style.setProperty('--card-border', cardBorder);
      root.style.setProperty('--blob-1', cardBorder);
      root.style.setProperty('--blob-2', hex);
      root.style.setProperty('--blob-3', secBtnBg);
      root.style.setProperty('--blob-4', bgCard);
      root.style.setProperty('--icon-bg', secBtnBg);
      root.style.setProperty('--icon-color', `rgb(${Math.round(rgb.r * 0.35)}, ${Math.round(rgb.g * 0.35)}, ${Math.round(rgb.b * 0.35)})`);
      root.style.setProperty('--header-glow', `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.25)`);
    }

    function extractColorFromImg(elementId) {
      const img = document.getElementById(elementId);
      if (!img || !img.src) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 50;
      canvas.height = 50;

      try {
        ctx.drawImage(img, 0, 0, 50, 50);
        const imgData = ctx.getImageData(0, 0, 50, 50).data;
        let r = 0, g = 0, b = 0, count = 0;

        for (let i = 0; i < imgData.length; i += 16) {
          r += imgData[i];
          g += imgData[i + 1];
          b += imgData[i + 2];
          count++;
        }

        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);

        const hex = rgbToHex(r, g, b);
        document.getElementById('inputCustomColor').value = hex;
        document.getElementById('selectTheme').value = 'theme-custom';
        handleThemeChange();
        applyDynamicCustomColor(hex);
      } catch (e) {
        console.log('Cross-origin canvas restriction.');
      }
    }

    async function loadProfile() {
      const loadingBox = document.getElementById('loadingBox');
      const urlParams = new URLSearchParams(window.location.search);
      let cardId = urlParams.get('id');

      try {
        let response;
        if (cardId) {
          response = await _supabase.from('cards').select('*').eq('id', cardId).maybeSingle();
        } else {
          response = await _supabase.from('cards').select('*').limit(1).maybeSingle();
        }

        if (response.error) throw response.error;

        if (response.data) {
          currentCard = response.data;
          renderUI(currentCard);
        } else {
          loadingBox.innerHTML = `
            <div class="py-6 px-4">
              <p class="text-red-500 font-bold text-sm">Card Not Found</p>
              <p class="text-xs text-slate-400 mt-1">Walang nahanap na record sa database.</p>
            </div>
          `;
        }
      } catch (err) {
        console.error("Load Error:", err);
        loadingBox.innerHTML = `
          <div class="py-6 px-4">
            <p class="text-red-500 font-bold text-sm">Failed to Load Profile</p>
            <p class="text-[11px] text-slate-400 mt-1">${err.message || 'Please check connection'}</p>
          </div>
        `;
      }
    }

    function renderUI(data) {
      document.getElementById('loadingBox').classList.add('hidden');
      document.getElementById('cardContent').classList.remove('hidden');

      document.getElementById('displayName').innerText = data.full_name || data.name || 'Card Holder';
      document.getElementById('displayTitle').innerText = data.title || data.job_title || 'Digital NFC Card';
      document.getElementById('displayBio').innerText = data.bio || '';
      document.getElementById('displayPhone').innerText = data.phone || 'N/A';
      document.getElementById('displayEmail').innerText = data.email || 'N/A';
      document.getElementById('displayWebsite').innerText = data.website || 'N/A';
      
      if (data.avatar) document.getElementById('avatarImg').src = data.avatar;
      if (data.cover) document.getElementById('coverImg').src = data.cover;

      document.getElementById('linkPhone').href = data.phone ? 'tel:' + data.phone : '#';
      document.getElementById('linkEmail').href = data.email ? 'mailto:' + data.email : '#';
      document.getElementById('linkWebsite').href = fixUrl(data.website);

      document.getElementById('linkFacebook').href = fixUrl(data.facebook);
      document.getElementById('linkInstagram').href = fixUrl(data.instagram);

      if (data.whatsapp) {
        const cleanWa = data.whatsapp.replace(/[^0-9]/g, '');
        document.getElementById('linkWhatsapp').href = cleanWa ? `https://wa.me/${cleanWa}` : fixUrl(data.whatsapp);
      } else {
        document.getElementById('linkWhatsapp').href = '#';
      }

      if (data.wechat) {
        document.getElementById('linkWechat').href = data.wechat.startsWith('http') ? data.wechat : `weixin://dl/chat?${data.wechat}`;
      } else {
        document.getElementById('linkWechat').href = '#';
      }

      const body = document.getElementById('bodyTag');
      const customCol = data.custom_color || data.customColor;

      if (data.theme === 'theme-custom' && customCol) {
        body.className = `${data.font || 'font-whiteangelica'} p-4 transition-colors duration-500 relative`;
        applyDynamicCustomColor(customCol);
      } else {
        document.documentElement.removeAttribute('style');
        body.className = `${data.theme || 'theme-pink'} ${data.font || 'font-whiteangelica'} p-4 transition-colors duration-500 relative`;
      }
    }

    function handleThemeChange() {
      const select = document.getElementById('selectTheme');
      const customBox = document.getElementById('customColorBox');
      if (select.value === 'theme-custom') {
        customBox.classList.remove('hidden');
      } else {
        customBox.classList.add('hidden');
      }
    }

    function openPasscodeModal() {
      document.getElementById('authPin').value = '';
      document.getElementById('pinError').classList.add('hidden');
      document.getElementById('passcodeModal').classList.remove('hidden');
    }

    function closePasscodeModal() {
      document.getElementById('passcodeModal').classList.add('hidden');
    }

    function verifyPasscode() {
      const currentPin = String(currentCard?.pin || currentCard?.passcode || '1234');
      const enteredPin = document.getElementById('authPin').value.trim();

      if (enteredPin === currentPin) {
        closePasscodeModal();
        toggleModal(true);
      } else {
        document.getElementById('pinError').classList.remove('hidden');
      }
    }

    function openRecoveryModal() {
      closePasscodeModal();
      document.getElementById('recoveryKey').value = '';
      document.getElementById('recoveryError').classList.add('hidden');
      document.getElementById('recoveryModal').classList.remove('hidden');
    }

    function closeRecoveryModal() {
      document.getElementById('recoveryModal').classList.add('hidden');
    }

    async function resetPasscode() {
      const enteredCode = document.getElementById('recoveryKey').value.trim();
      if (enteredCode === MASTER_RECOVERY_CODE) {
        try {
          const updateObj = currentCard.hasOwnProperty('pin') ? { pin: '1234' } : { passcode: '1234' };
          const { error } = await _supabase.from('cards').update(updateObj).eq('id', currentCard.id);

          if (error) throw error;

          showToast('PIN reset to default: 1234', false, 'PIN Reset');
          if (currentCard.hasOwnProperty('pin')) currentCard.pin = '1234';
          else currentCard.passcode = '1234';

          closeRecoveryModal();
          toggleModal(true);
        } catch (err) {
          showToast(err.message, true, 'Error');
        }
      } else {
        document.getElementById('recoveryError').classList.remove('hidden');
      }
    }

    function toggleModal(show) {
      const modal = document.getElementById('editModal');
      if (show && currentCard) {
        document.getElementById('inputPasscode').value = currentCard.pin || currentCard.passcode || '1234';
        document.getElementById('inputName').value = currentCard.full_name || currentCard.name || '';
        document.getElementById('inputTitle').value = currentCard.title || currentCard.job_title || '';
        document.getElementById('inputBio').value = currentCard.bio || '';
        document.getElementById('inputPhone').value = currentCard.phone || '';
        document.getElementById('inputEmail').value = currentCard.email || '';
        document.getElementById('inputWebsite').value = currentCard.website || '';
        document.getElementById('inputFacebook').value = currentCard.facebook || '';
        document.getElementById('inputInstagram').value = currentCard.instagram || '';
        document.getElementById('inputWhatsapp').value = currentCard.whatsapp || '';
        document.getElementById('inputWechat').value = currentCard.wechat || '';
        document.getElementById('selectTheme').value = currentCard.theme || 'theme-pink';
        document.getElementById('inputCustomColor').value = currentCard.custom_color || currentCard.customColor || '#ec4899';
        document.getElementById('selectFont').value = currentCard.font || 'font-whiteangelica';
        
        handleThemeChange();

        document.getElementById('fileAvatar').value = '';
        document.getElementById('fileCover').value = '';

        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }

    function compressImage(file, maxWidth = 500, quality = 0.75) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    }

    async function saveProfile() {
      const newPin = document.getElementById('inputPasscode').value.trim();
      if (newPin && newPin.length !== 4) {
        showToast('Ang PIN ay kailangang 4 digits!', true, 'Validation Error');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.innerText = 'Saving...';
      saveBtn.disabled = true;

      try {
        const avatarFile = document.getElementById('fileAvatar').files[0];
        const coverFile = document.getElementById('fileCover').files[0];

        let newAvatar = currentCard.avatar;
        let newCover = currentCard.cover;

        if (avatarFile) {
          newAvatar = await compressImage(avatarFile, 400, 0.8);
        }
        if (coverFile) {
          newCover = await compressImage(coverFile, 800, 0.75);
        }

        const candidatePayload = {};
        candidatePayload.full_name = document.getElementById('inputName').value;
        candidatePayload.name = document.getElementById('inputName').value;
        candidatePayload.title = document.getElementById('inputTitle').value;
        candidatePayload.job_title = document.getElementById('inputTitle').value;
        candidatePayload.pin = newPin || '1234';
        candidatePayload.passcode = newPin || '1234';
        candidatePayload.custom_color = document.getElementById('inputCustomColor').value;
        candidatePayload.customColor = document.getElementById('inputCustomColor').value;
        candidatePayload.bio = document.getElementById('inputBio').value;
        candidatePayload.phone = document.getElementById('inputPhone').value;
        candidatePayload.email = document.getElementById('inputEmail').value;
        candidatePayload.website = document.getElementById('inputWebsite').value;
        candidatePayload.facebook = document.getElementById('inputFacebook').value;
        candidatePayload.instagram = document.getElementById('inputInstagram').value;
        candidatePayload.whatsapp = document.getElementById('inputWhatsapp').value;
        candidatePayload.wechat = document.getElementById('inputWechat').value;
        candidatePayload.avatar = newAvatar;
        candidatePayload.cover = newCover;
        candidatePayload.theme = document.getElementById('selectTheme').value;
        candidatePayload.font = document.getElementById('selectFont').value;

        // Strict Filtering according to existing row schema
        const updatePayload = {};
        Object.keys(currentCard).forEach(col => {
          if (candidatePayload.hasOwnProperty(col) && candidatePayload[col] !== undefined) {
            updatePayload[col] = candidatePayload[col];
          }
        });

        const { error } = await _supabase
          .from('cards')
          .update(updatePayload)
          .eq('id', currentCard.id);

        if (error) throw error;

        Object.assign(currentCard, updatePayload);
        renderUI(currentCard);
        
        toggleModal(false);
        showToast('Card profile updated successfully!', false, 'Success');

      } catch (err) {
        showToast('Save failed: ' + err.message, true, 'Error');
        console.error(err);
      } finally {
        saveBtn.innerText = 'Save Changes';
        saveBtn.disabled = false;
      }
    }

    function downloadVCard() {
      if (!currentCard) return;
      const name = currentCard.full_name || currentCard.name || 'Contact';
      const title = currentCard.title || currentCard.job_title || '';
      const vcardData = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTITLE:${title}\nTEL;TYPE=CELL:${currentCard.phone || ''}\nEMAIL:${currentCard.email || ''}\nURL:${fixUrl(currentCard.website)}\nEND:VCARD`;

      const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', `${name.replace(/\s+/g, '_')}_contact.vcf`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    async function shareCard() {
      if (navigator.share) {
        try {
          await navigator.share({
            title: currentCard?.full_name || currentCard?.name || 'Digital Card',
            text: `${currentCard?.full_name || currentCard?.name || 'Digital Card'} - ${currentCard?.title || ''}`,
            url: window.location.href
          });
        } catch (err) {}
      } else {
        navigator.clipboard.writeText(window.location.href);
        showToast('Link copied to clipboard!', false, 'Copied');
      }
    }

    window.addEventListener('DOMContentLoaded', loadProfile);
  </script>
