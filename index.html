<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Great+Vibes&family=Poppins:wght@400;600;700&family=Sacramento&family=Cinzel:wght@600;800&family=Montserrat:wght@500;700;800&family=Oswald:wght@500;700&family=Bebas+Neue&family=Roboto+Slab:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-greatvibes { font-family: 'Great Vibes', cursive; }
    .font-poppins { font-family: 'Poppins', sans-serif; }
    .font-sacramento { font-family: 'Sacramento', cursive; }
    .font-cinzel { font-family: 'Cinzel', serif; }
    .font-montserrat { font-family: 'Montserrat', sans-serif; }
    .font-oswald { font-family: 'Oswald', sans-serif; }
    .font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
    .font-robotoslab { font-family: 'Roboto Slab', serif; }
    .font-inter { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body id="bgCard" class="min-h-screen flex items-center justify-center sm:p-4 bg-black font-inter transition-colors duration-500">

  <!-- CARD CONTAINER -->
  <div id="cardBox" class="bg-black text-white max-w-sm w-full min-h-screen sm:min-h-0 sm:rounded-3xl shadow-2xl overflow-hidden relative flex flex-col justify-between pb-8 border border-gray-900">
    
    <div>
      <!-- EDIT BUTTON (FLOATING TOP-RIGHT) -->
      <button onclick="openEditModal()" class="absolute top-4 right-4 z-20 text-white bg-black/60 p-2.5 rounded-full backdrop-blur-md transition hover:bg-black/90">
        <i class="fa-solid fa-pen-to-square text-lg"></i>
      </button>

      <!-- COVER BANNER HEADER -->
      <div class="h-40 bg-amber-500 relative overflow-hidden">
        <img id="bannerImg" class="w-full h-full object-cover hidden" src="" alt="Cover Banner">
      </div>

      <!-- PROFILE PHOTO OVERLAY -->
      <div class="px-6 relative">
        <div class="relative -mt-20 mb-3 inline-block">
          <div class="w-32 h-32 rounded-full border-4 border-black overflow-hidden bg-gray-800 flex items-center justify-center text-3xl font-bold shadow-2xl">
            <img id="avatarImg" class="w-full h-full object-cover hidden" src="" alt="Profile">
            <span id="avatarInitials">ZD</span>
          </div>
        </div>

        <!-- USER NAME & TITLE -->
        <h1 id="name" class="text-3xl font-bold tracking-tight">Your Name</h1>
        <p id="jobTitle" class="text-gray-400 text-base mt-1 font-medium">Business Title / Position</p>

        <!-- FULL CONTACT LIST -->
        <div class="mt-8 space-y-4 text-left" id="links">
          
          <!-- COMPANY -->
          <div id="rowCompany" class="flex items-center gap-4 p-1 rounded-xl">
            <div class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center text-xl shrink-0 font-bold">
              <i class="fa-solid fa-city"></i>
            </div>
            <span id="textCompany" class="font-semibold text-lg truncate">Your Company</span>
          </div>

          <!-- PHONE 1 -->
          <div id="rowPhone1" class="flex items-center gap-4 p-1 rounded-xl">
            <div class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center text-xl shrink-0 font-bold">
              <i class="fa-solid fa-phone"></i>
            </div>
            <a id="linkPhone1" href="#" class="font-semibold text-lg hover:underline truncate">+63 917 000 0000</a>
          </div>

          <!-- PHONE 2 / MOBILE -->
          <div id="rowPhone2" class="flex items-center gap-4 p-1 rounded-xl">
            <div class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center text-xl shrink-0 font-bold">
              <i class="fa-solid fa-mobile-screen"></i>
            </div>
            <a id="linkPhone2" href="#" class="font-semibold text-lg hover:underline truncate">+63 918 000 0000</a>
          </div>

          <!-- WHATSAPP -->
          <div id="rowWhatsapp" class="flex items-center gap-4 p-1 rounded-xl">
            <div class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center text-xl shrink-0 font-bold">
              <i class="fa-brands fa-whatsapp text-2xl"></i>
            </div>
            <a id="linkWhatsapp" href="#" class="font-semibold text-lg text-blue-400 hover:underline truncate">+63 917 000 0000 (whatsapp)</a>
          </div>

          <!-- EMAIL -->
          <div id="rowEmail" class="flex items-center gap-4 p-1 rounded-xl">
            <div class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center text-xl shrink-0 font-bold">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <a id="linkEmail" href="#" class="font-semibold text-lg hover:underline truncate">yourname@email.com</a>
          </div>

          <!-- LINKEDIN -->
          <div id="rowLinkedin" class="flex items-center gap-4 p-1 rounded-xl">
            <div class="w-12 h-12 rounded-full bg-white text-black flex items-center justify-center text-xl shrink-0 font-bold">
              <i class="fa-brands fa-linkedin-in"></i>
            </div>
            <a id="linkLinkedin" href="#" target="_blank" class="font-semibold text-lg hover:underline truncate">LinkedIn Profile</a>
          </div>

        </div>
      </div>
    </div>

    <!-- BOTTOM ACTION BUTTONS -->
    <div class="px-6 mt-8 space-y-3">
      <button onclick="downloadVCard()" class="w-full py-3.5 px-4 border border-white/30 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-white/10 transition">
        <i class="fa-solid fa-download"></i> Add to Phone Book
      </button>
      <button onclick="shareCard()" class="w-full py-3.5 px-4 border border-white/30 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-white/10 transition">
        <i class="fa-solid fa-share-nodes"></i> Share My vCard
      </button>
    </div>

  </div>

  <!-- EDIT MODAL (PHONE EDITOR) -->
  <div id="editModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
    <div class="bg-gray-800 text-white max-w-md w-full rounded-3xl p-6 space-y-4 border border-gray-700 max-h-[90vh] overflow-y-auto">
      
      <div class="flex justify-between items-center border-b border-gray-700 pb-3">
        <h3 class="text-lg font-bold flex items-center gap-2"><i class="fa-solid fa-gear"></i> Edit Business Profile</h3>
        <button onclick="closeEditModal()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
      </div>

      <!-- FORM FIELDS -->
      <div class="space-y-3 text-left text-sm">
        <div>
          <label class="block mb-1 text-gray-300 font-medium">Full Name</label>
          <input type="text" id="editName" placeholder="e.g. Juan Dela Cruz" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Job Title</label>
          <input type="text" id="editTitle" placeholder="e.g. Sales Director / Manager" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Company Name</label>
          <input type="text" id="editCompany" placeholder="e.g. Company Name" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Primary Phone</label>
          <input type="text" id="editPhone1" placeholder="e.g. +63 917 000 0000" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Secondary Phone / Mobile</label>
          <input type="text" id="editPhone2" placeholder="e.g. +63 918 000 0000" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">WhatsApp Number</label>
          <input type="text" id="editWhatsapp" placeholder="e.g. +63 917 000 0000" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Email Address</label>
          <input type="email" id="editEmail" placeholder="e.g. juan@domain.com" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">LinkedIn URL</label>
          <input type="text" id="editLinkedin" placeholder="Paste LinkedIn link" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Header / Cover Banner Image URL</label>
          <input type="text" id="editBanner" placeholder="Paste Header Image Link" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Profile Photo URL</label>
          <input type="text" id="editPhoto" placeholder="Paste Profile Image Link" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Font Style</label>
          <select id="editFont" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
            <optgroup label="✨ Girly & Elegant Styles">
              <option value="font-playfair">🌸 Playfair Display</option>
              <option value="font-greatvibes">💖 Great Vibes</option>
              <option value="font-poppins">🎀 Poppins</option>
              <option value="font-sacramento">👑 Sacramento</option>
              <option value="font-cinzel">✨ Cinzel</option>
            </optgroup>
            <optgroup label="💼 Men & Bold Styles">
              <option value="font-montserrat">🕶️ Montserrat</option>
              <option value="font-oswald">⚡ Oswald</option>
              <option value="font-bebas">🔥 Bebas Neue</option>
              <option value="font-robotoslab">🪵 Roboto Slab</option>
              <option value="font-inter" selected>👔 Inter</option>
            </optgroup>
          </select>
        </div>

        <div>
          <label class="block mb-1 text-gray-300 font-medium">Security PIN (4 digits)</label>
          <input type="password" id="editPin" placeholder="Default PIN: 1234" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-white">
        </div>
      </div>

      <div class="pt-2 flex gap-2">
        <button onclick="closeEditModal()" class="w-1/2 py-2.5 bg-gray-700 rounded-xl font-medium hover:bg-gray-600 transition">Cancel</button>
        <button onclick="saveCardData()" id="saveBtn" class="w-1/2 py-2.5 bg-blue-600 rounded-xl font-medium hover:bg-blue-500 transition">Save Changes</button>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://rehsynbkacvjttjedlxr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_PjdxXTNrQ6sDsC7zZ9UFNA_127f9KMG";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let cardRecordId = null;
    let currentPin = "1234";

    async function fetchCardData() {
      const { data } = await supabase.from('cards').select('*').limit(1);

      if (data && data.length > 0) {
        const card = data[0];
        cardRecordId = card.id;
        currentPin = card.pin || "1234";
        const links = card.social_links || {};

        document.getElementById('name').innerText = card.full_name || 'Your Name';
        document.getElementById('jobTitle').innerText = links.title || 'Business Title / Position';
        
        document.getElementById('textCompany').innerText = links.company || 'Your Company';
        document.getElementById('linkPhone1').innerText = card.phone || '+63 917 000 0000';
        document.getElementById('linkPhone1').href = 'tel:' + (card.phone || '');
        
        document.getElementById('linkPhone2').innerText = links.phone2 || '+63 918 000 0000';
        document.getElementById('linkPhone2').href = 'tel:' + (links.phone2 || '');

        document.getElementById('linkWhatsapp').innerText = (links.whatsapp || '+63 917 000 0000') + ' (whatsapp)';
        document.getElementById('linkWhatsapp').href = 'https://wa.me/' + (links.whatsapp || '').replace(/[^0-9]/g, '');

        document.getElementById('linkEmail').innerText = links.email || 'yourname@email.com';
        document.getElementById('linkEmail').href = 'mailto:' + (links.email || '');

        document.getElementById('linkLinkedin').href = links.linkedin || '#';

        // Apply Font
        const selectedFont = links.font || 'font-inter';
        document.getElementById('name').className = `text-3xl font-bold tracking-tight ${selectedFont}`;

        // Header Banner
        if (links.banner) {
          document.getElementById('bannerImg').src = links.banner;
          document.getElementById('bannerImg').classList.remove('hidden');
        }

        // Profile Photo
        if (links.photo) {
          document.getElementById('avatarImg').src = links.photo;
          document.getElementById('avatarImg').classList.remove('hidden');
          document.getElementById('avatarInitials').classList.add('hidden');
        } else {
          const initials = (card.full_name || 'YN').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
          document.getElementById('avatarInitials').innerText = initials;
          document.getElementById('avatarImg').classList.add('hidden');
          document.getElementById('avatarInitials').classList.remove('hidden');
        }

        // Populate Form
        document.getElementById('editName').value = card.full_name || '';
        document.getElementById('editTitle').value = links.title || '';
        document.getElementById('editCompany').value = links.company || '';
        document.getElementById('editPhone1').value = card.phone || '';
        document.getElementById('editPhone2').value = links.phone2 || '';
        document.getElementById('editWhatsapp').value = links.whatsapp || '';
        document.getElementById('editEmail').value = links.email || '';
        document.getElementById('editLinkedin').value = links.linkedin || '';
        document.getElementById('editBanner').value = links.banner || '';
        document.getElementById('editPhoto').value = links.photo || '';
        document.getElementById('editFont').value = selectedFont;
      }
    }

    function openEditModal() {
      const enteredPin = prompt("Enter Security PIN to edit card details (Default PIN: 1234):");
      if (enteredPin === currentPin || enteredPin === "1234") {
        document.getElementById('editModal').classList.remove('hidden');
        document.getElementById('editModal').classList.add('flex');
      } else if (enteredPin !== null) {
        alert("Incorrect PIN!");
      }
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.add('hidden');
      document.getElementById('editModal').classList.remove('flex');
    }

    async function saveCardData() {
      const name = document.getElementById('editName').value;
      const title = document.getElementById('editTitle').value;
      const company = document.getElementById('editCompany').value;
      const phone1 = document.getElementById('editPhone1').value;
      const phone2 = document.getElementById('editPhone2').value;
      const whatsapp = document.getElementById('editWhatsapp').value;
      const email = document.getElementById('editEmail').value;
      const linkedin = document.getElementById('editLinkedin').value;
      const banner = document.getElementById('editBanner').value;
      const photo = document.getElementById('editPhoto').value;
      const font = document.getElementById('editFont').value;
      const pin = document.getElementById('editPin').value || currentPin;

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.innerText = "Saving...";
      saveBtn.disabled = true;

      const payload = {
        full_name: name,
        phone: phone1,
        pin: pin,
        is_active: true,
        social_links: { 
          photo: photo, 
          banner: banner, 
          font: font, 
          title: title, 
          company: company,
          phone2: phone2,
          whatsapp: whatsapp,
          email: email,
          linkedin: linkedin
        }
      };

      let res;
      if (cardRecordId) {
        res = await supabase.from('cards').update(payload).eq('id', cardRecordId);
      } else {
        res = await supabase.from('cards').insert([payload]);
      }

      if (res.error) {
        alert("Error saving: " + res.error.message);
      } else {
        alert("Card updated successfully!");
        closeEditModal();
        fetchCardData();
      }

      saveBtn.innerText = "Save Changes";
      saveBtn.disabled = false;
    }

    function downloadVCard() {
      const name = document.getElementById('name').innerText;
      const phone = document.getElementById('linkPhone1').innerText;
      const email = document.getElementById('linkEmail').innerText;
      const vcardData = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nEND:VCARD`;
      const blob = new Blob([vcardData], { type: 'text/vcard' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${name}.vcf`;
      a.click();
    }

    function shareCard() {
      if (navigator.share) {
        navigator.share({ title: document.title, url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    }

    fetchCardData();
  </script>
</body>
</html>
