<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="bodyTag" class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4 transition-colors duration-500">

  <!-- MAIN CARD CONTAINER -->
  <div id="cardContainer" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden relative p-6">
    <div id="loading" class="text-center py-10 font-bold text-gray-500">
      Loading digital card...
    </div>
    
    <div id="cardContent" class="hidden text-center">
      <div class="relative inline-block mb-4">
        <img id="avatar" src="https://via.placeholder.com/150" class="w-28 h-28 rounded-full object-cover mx-auto border-4 border-white shadow">
        <button onclick="openPasscodeModal()" class="absolute bottom-0 right-0 bg-gray-800 text-white p-2 rounded-full shadow hover:bg-black transition">
          ✏️
        </button>
      </div>

      <h2 id="fullName" class="text-2xl font-bold text-gray-800 mb-1">---</h2>
      <p id="jobTitle" class="text-sm text-gray-500 mb-6">---</p>

      <div class="space-y-3 text-left mb-6">
        <div class="p-3 bg-gray-50 rounded-xl">📞 <span id="phoneText">---</span></div>
        <div class="p-3 bg-gray-50 rounded-xl">✉️ <span id="emailText">---</span></div>
        <div class="p-3 bg-gray-50 rounded-xl">🌐 <span id="websiteText">---</span></div>
      </div>

      <div class="flex gap-2">
        <button onclick="openPasscodeModal()" class="flex-1 bg-pink-500 text-white font-bold py-3 rounded-xl shadow hover:bg-pink-600 transition">
          Edit Profile
        </button>
      </div>
    </div>
  </div>

  <!-- PASSCODE MODAL -->
  <div id="passcodeModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white p-6 rounded-2xl w-full max-w-xs text-center">
      <h3 class="font-bold text-lg mb-3">Enter Security PIN</h3>
      <input type="password" id="pinInput" placeholder="PIN (default 123456)" class="w-full border p-2 rounded-xl mb-4 text-center">
      <div class="flex gap-2">
        <button onclick="closePasscodeModal()" class="flex-1 bg-gray-200 py-2 rounded-xl">Cancel</button>
        <button onclick="verifyPin()" class="flex-1 bg-black text-white py-2 rounded-xl">Submit</button>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white p-6 rounded-2xl w-full max-w-md space-y-4">
      <h3 class="font-bold text-xl text-gray-800">Edit Card</h3>
      <div>
        <label class="text-xs font-bold text-gray-500">Full Name</label>
        <input type="text" id="editName" class="w-full border p-2 rounded-xl mt-1">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500">Phone</label>
        <input type="text" id="editPhone" class="w-full border p-2 rounded-xl mt-1">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500">Theme</label>
        <select id="editTheme" class="w-full border p-2 rounded-xl mt-1">
          <option value="bg-gray-100">Gray Theme</option>
          <option value="bg-pink-100">Pink Theme</option>
          <option value="bg-blue-100">Blue Theme</option>
          <option value="bg-emerald-100">Green Theme</option>
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button onclick="closeEditModal()" class="flex-1 bg-gray-200 py-2 rounded-xl">Cancel</button>
        <button onclick="saveProfile()" class="flex-1 bg-pink-500 text-white py-2 rounded-xl font-bold">Save</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://rehsynbkacvjttjedlxr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_PjdxXTNrQ6sDsC7zZ9UFNA_127f9a123";

    let currentCard = null;

    async function loadCard() {
      const urlParams = new URLSearchParams(window.location.search);
      let cardId = urlParams.get('id');

      // Direct REST Endpoint Request (No SDK Bug Risk)
      let endpoint = `${SUPABASE_URL}/rest/v1/cards?select=*`;
      if (cardId) {
        endpoint += `&id=eq.${cardId}`;
      } else {
        endpoint += `&limit=1`; // Fallback sa 1st card kung walang id sa URL
      }

      try {
        const response = await fetch(endpoint, {
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!response.ok) throw new Error("HTTP error " + response.status);

        const data = await response.json();

        if (data && data.length > 0) {
          currentCard = data[0];
          renderUI(currentCard);
        } else {
          document.getElementById('loading').innerHTML = `
            <p class="text-red-500 font-bold">Card Not Found!</p>
            <p class="text-xs text-gray-500 mt-1">Ang ID sa URL ay wala sa 100 cards mo.</p>
          `;
        }
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Error loading card</p>`;
      }
    }

    function renderUI(card) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('cardContent').classList.remove('hidden');

      document.getElementById('fullName').innerText = card.full_name || 'No Name';
      document.getElementById('jobTitle').innerText = card.job_title || 'Business Card Holder';
      document.getElementById('phoneText').innerText = card.phone || 'N/A';
      document.getElementById('emailText').innerText = card.email || 'N/A';
      document.getElementById('websiteText').innerText = card.website || 'N/A';

      if (card.theme) {
        document.body.className = `${card.theme} font-sans min-h-screen flex items-center justify-center p-4 transition-colors duration-500`;
      }
    }

    function openPasscodeModal() { document.getElementById('passcodeModal').classList.remove('hidden'); }
    function closePasscodeModal() { document.getElementById('passcodeModal').classList.add('hidden'); }
    function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

    function verifyPin() {
      const pin = document.getElementById('pinInput').value;
      if (pin === (currentCard?.pin || "123456")) {
        closePasscodeModal();
        document.getElementById('editName').value = currentCard.full_name || '';
        document.getElementById('editPhone').value = currentCard.phone || '';
        document.getElementById('editTheme').value = currentCard.theme || 'bg-gray-100';
        document.getElementById('editModal').classList.remove('hidden');
      } else {
        alert("Incorrect PIN!");
      }
    }

    async function saveProfile() {
      const newName = document.getElementById('editName').value;
      const newPhone = document.getElementById('editPhone').value;
      const newTheme = document.getElementById('editTheme').value;

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/cards?id=eq.${currentCard.id}`, {
          method: 'PATCH',
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            full_name: newName,
            phone: newPhone,
            theme: newTheme
          })
        });

        if (!response.ok) throw new Error("Save failed");

        alert("Saved successfully!");
        location.reload();
      } catch (err) {
        alert("Failed to save: " + err.message);
      }
    }

    window.addEventListener('DOMContentLoaded', loadCard);
  </script>
</body>
</html>
