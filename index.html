<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="bgCard" class="min-h-screen flex items-center justify-center p-4 transition-colors duration-500 bg-gray-900">
  
  <div id="cardBox" class="bg-gray-800 text-white max-w-sm w-full rounded-2xl shadow-2xl overflow-hidden text-center p-6 space-y-4 border border-gray-700">
    <div id="avatar" class="w-24 h-24 bg-gray-700 text-white rounded-full flex items-center justify-center text-3xl font-bold mx-auto shadow-md border-2 border-gray-500">
      ZD
    </div>
    
    <div>
      <h1 id="name" class="text-2xl font-bold">Zialink Digital</h1>
      <p id="phone" class="text-sm opacity-80">Tap to connect</p>
    </div>

    <div class="space-y-2 pt-2" id="links">
      <a href="tel:" id="callBtn" class="block w-full py-2.5 bg-gray-700 text-white font-medium rounded-xl shadow hover:opacity-90 transition">Call Me</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://rehsynbkacvjttjedlxr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_PjdxXTNrQ6sDsC7zZ9UFNA_127f9KMG";

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Map ng 9 na Kulay / Themes
    const themes = {
      black: { bg: 'bg-gray-950', box: 'bg-gray-900 border-gray-800 text-white', btn: 'bg-gray-800 text-white', avatar: 'bg-gray-800 text-white border-gray-700' },
      gray: { bg: 'bg-slate-200', box: 'bg-slate-800 border-slate-700 text-slate-100', btn: 'bg-slate-700 text-white', avatar: 'bg-slate-600 text-white border-slate-500' },
      blush_pink: { bg: 'bg-rose-100', box: 'bg-white border-rose-200 text-rose-950', btn: 'bg-rose-400 text-white', avatar: 'bg-rose-300 text-rose-950 border-rose-200' },
      pastel_pink: { bg: 'bg-pink-100', box: 'bg-white border-pink-200 text-pink-900', btn: 'bg-pink-300 text-pink-950', avatar: 'bg-pink-200 text-pink-950 border-pink-300' },
      sky_blue: { bg: 'bg-sky-200', box: 'bg-white border-sky-300 text-sky-950', btn: 'bg-sky-500 text-white', avatar: 'bg-sky-400 text-white border-sky-300' },
      pastel_blue: { bg: 'bg-blue-50', box: 'bg-white border-blue-100 text-blue-900', btn: 'bg-blue-200 text-blue-950', avatar: 'bg-blue-100 text-blue-900 border-blue-200' },
      pastel_yellow: { bg: 'bg-amber-50', box: 'bg-white border-amber-200 text-amber-950', btn: 'bg-amber-200 text-amber-950', avatar: 'bg-amber-100 text-amber-950 border-amber-200' },
      plum: { bg: 'bg-purple-950', box: 'bg-purple-900 border-purple-800 text-purple-100', btn: 'bg-purple-700 text-white', avatar: 'bg-purple-800 text-purple-200 border-purple-700' },
      dark_green: { bg: 'bg-emerald-950', box: 'bg-emerald-900 border-emerald-800 text-emerald-100', btn: 'bg-emerald-700 text-white', avatar: 'bg-emerald-800 text-emerald-200 border-emerald-700' }
    };

    async function loadCardData() {
      const { data, error } = await supabase.from('cards').select('*').limit(1).single();
      
      if (data) {
        if (data.full_name) document.getElementById('name').innerText = data.full_name;
        if (data.phone) {
          document.getElementById('phone').innerText = data.phone;
          document.getElementById('callBtn').href = 'tel:' + data.phone;
        }
        if (data.full_name) document.getElementById('avatar').innerText = data.full_name.charAt(0).toUpperCase();

        // Kukuning theme sa database (default sa 'black' kung walang ilagay)
        const selectedTheme = themes[data.theme] || themes['black'];
        document.getElementById('bgCard').className = `min-h-screen flex items-center justify-center p-4 transition-colors duration-500 ${selectedTheme.bg}`;
        document.getElementById('cardBox').className = `max-w-sm w-full rounded-2xl shadow-2xl overflow-hidden text-center p-6 space-y-4 border ${selectedTheme.box}`;
        document.getElementById('callBtn').className = `block w-full py-2.5 font-medium rounded-xl shadow hover:opacity-90 transition ${selectedTheme.btn}`;
        document.getElementById('avatar').className = `w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold mx-auto shadow-md border-2 ${selectedTheme.avatar}`;
      }
    }
    loadCardData();
  </script>
</body>
</html>
