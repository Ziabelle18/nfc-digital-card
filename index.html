<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital NFC Business Card</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-center items-center p-4">

  <!-- Main Card Container -->
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden relative my-8">
    
    <!-- Cover Photo -->
    <div class="h-36 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 relative">
      <img id="coverImg" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800" alt="Cover" class="w-full h-full object-cover opacity-60">
    </div>

    <!-- Profile Header Section -->
    <div class="px-6 pb-6 relative text-center">
      <!-- Profile Picture -->
      <div class="relative -mt-16 mb-4 inline-block">
        <img id="avatarImg" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400" alt="Avatar" class="w-28 h-28 rounded-full border-4 border-slate-900 object-cover shadow-lg mx-auto">
      </div>

      <h1 id="displayName" class="text-2xl font-bold text-white">Alex Rivera</h1>
      <p id="displayTitle" class="text-sm font-medium text-indigo-400 mt-1">Creative Director & Web Developer</p>
      <p id="displayBio" class="text-xs text-slate-400 mt-2 px-4">Building sleek digital experiences & web solutions.</p>

      <!-- Action Buttons (Save Contact & Share) -->
      <div class="grid grid-cols-2 gap-3 mt-6">
        <button onclick="downloadVCard()" class="flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg transition-all active:scale-95 text-sm">
          <i class="fa-solid fa-user-plus"></i>
          <span>Save Contact</span>
        </button>
        <button onclick="shareCard()" class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-semibold py-2.5 px-4 rounded-xl transition-all active:scale-95 text-sm">
          <i class="fa-solid fa-share-nodes"></i>
          <span>Share</span>
        </button>
      </div>

      <!-- Contact Links -->
      <div class="mt-6 space-y-3 text-left" id="socialLinks">
        <a id="linkPhone" href="tel:+1234567890" class="flex items-center gap-4 p-3 rounded-2xl bg-slate-800/60 border border-slate-800 hover:border-slate-700 transition">
          <div class="w-10 h-10 rounded-xl bg-blue-500/10 text-blue-400 flex items-center justify-center">
            <i class="fa-solid fa-phone"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-slate-400 font-medium">Phone</p>
            <p id="displayPhone" class="text-sm font-semibold text-slate-200 truncate">+1 (234) 567-890</p>
          </div>
        </a>

        <a id="linkEmail" href="mailto:alex@example.com" class="flex items-center gap-4 p-3 rounded-2xl bg-slate-800/60 border border-slate-800 hover:border-slate-700 transition">
          <div class="w-10 h-10 rounded-xl bg-indigo-500/10 text-indigo-400 flex items-center justify-center">
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-slate-400 font-medium">Email</p>
            <p id="displayEmail" class="text-sm font-semibold text-slate-200 truncate">alex@example.com</p>
          </div>
        </a>

        <a id="linkWebsite" href="https://example.com" target="_blank" class="flex items-center gap-4 p-3 rounded-2xl bg-slate-800/60 border border-slate-800 hover:border-slate-700 transition">
          <div class="w-10 h-10 rounded-xl bg-purple-500/10 text-purple-400 flex items-center justify-center">
            <i class="fa-solid fa-globe"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-slate-400 font-medium">Website</p>
            <p id="displayWebsite" class="text-sm font-semibold text-slate-200 truncate">https://example.com</p>
          </div>
        </a>
      </div>
    </div>

    <!-- Floating Edit Button -->
    <button onclick="toggleModal(true)" class="absolute top-3 right-3 bg-slate-900/80 backdrop-blur-md border border-slate-700 text-slate-300 hover:text-white p-2.5 rounded-full shadow-md transition active:scale-95">
      <i class="fa-solid fa-pen text-xs"></i>
    </button>
  </div>

  <!-- Edit Profile Modal -->
  <div id="editModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex justify-center items-center p-4 z-50">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl p-6 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <h3 class="text-lg font-bold text-white">Edit Profile Details</h3>
        <button onclick="toggleModal(false)" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>

      <div class="space-y-3">
        <div>
          <label class="text-xs text-slate-400">Full Name</label>
          <input type="text" id="inputName" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="text-xs text-slate-400">Title / Occupation</label>
          <input type="text" id="inputTitle" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="text-xs text-slate-400">Bio</label>
          <input type="text" id="inputBio" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="text-xs text-slate-400">Phone</label>
          <input type="text" id="inputPhone" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="text-xs text-slate-400">Email</label>
          <input type="email" id="inputEmail" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="text-xs text-slate-400">Website URL</label>
          <input type="url" id="inputWebsite" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="text-xs text-slate-400">Avatar Image URL</label>
          <input type="url" id="inputAvatar" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
        </div>
      </div>

      <div class="pt-2 flex justify-end gap-2">
        <button onclick="toggleModal(false)" class="px-4 py-2 text-xs font-semibold text-slate-400 hover:text-white">Cancel</button>
        <button onclick="saveProfile()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold rounded-lg shadow">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    // Profile State Management
    const defaultData = {
      name: 'Alex Rivera',
      title: 'Creative Director & Web Developer',
      bio: 'Building sleek digital experiences & web solutions.',
      phone: '+1 (234) 567-890',
      email: 'alex@example.com',
      website: 'https://example.com',
      avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400'
    };

    function loadProfile() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      
      document.getElementById('displayName').innerText = data.name;
      document.getElementById('displayTitle').innerText = data.title;
      document.getElementById('displayBio').innerText = data.bio;
      document.getElementById('displayPhone').innerText = data.phone;
      document.getElementById('displayEmail').innerText = data.email;
      document.getElementById('displayWebsite').innerText = data.website;
      document.getElementById('avatarImg').src = data.avatar;

      document.getElementById('linkPhone').href = 'tel:' + data.phone;
      document.getElementById('linkEmail').href = 'mailto:' + data.email;
      document.getElementById('linkWebsite').href = data.website;
    }

    function toggleModal(show) {
      const modal = document.getElementById('editModal');
      if (show) {
        const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
        document.getElementById('inputName').value = data.name;
        document.getElementById('inputTitle').value = data.value || data.title;
        document.getElementById('inputBio').value = data.bio;
        document.getElementById('inputPhone').value = data.phone;
        document.getElementById('inputEmail').value = data.email;
        document.getElementById('inputWebsite').value = data.website;
        document.getElementById('inputAvatar').value = data.avatar;
        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }

    function saveProfile() {
      const updatedData = {
        name: document.getElementById('inputName').value,
        title: document.getElementById('inputTitle').value,
        bio: document.getElementById('inputBio').value,
        phone: document.getElementById('inputPhone').value,
        email: document.getElementById('inputEmail').value,
        website: document.getElementById('inputWebsite').value,
        avatar: document.getElementById('inputAvatar').value
      };

      localStorage.setItem('nfcCardData', JSON.stringify(updatedData));
      loadProfile();
      toggleModal(false);
    }

    // Dynamic vCard Export
    function downloadVCard() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:${data.name}
TITLE:${data.title}
TEL;TYPE=CELL:${data.phone}
EMAIL:${data.email}
URL:${data.website}
END:VCARD`;

      const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', `${data.name.replace(/\s+/g, '_')}_contact.vcf`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Web Share API with Clipboard Fallback
    async function shareCard() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      if (navigator.share) {
        try {
          await navigator.share({
            title: data.name,
            text: `${data.name} - ${data.title}`,
            url: window.location.href
          });
        } catch (err) {
          console.log('Share canceled');
        }
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    }

    // Initial Load
    loadProfile();
  </script>
</body>
</html>
