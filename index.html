<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Modern Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body id="bodyTag" class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

  <!-- MAIN CARD CONTAINER -->
  <div id="cardContainer" class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden relative p-6 transition-all duration-300">
    <div id="loading" class="text-center py-10 font-bold text-gray-500">
      Loading digital card...
    </div>
    
    <div id="cardContent" class="hidden text-center">
      <div class="relative inline-block mb-4">
        <img id="avatar" src="https://via.placeholder.com/150" class="w-28 h-28 rounded-full object-cover mx-auto border-4 border-white shadow">
        <button onclick="openPasscodeModal()" class="absolute bottom-0 right-0 bg-gray-800 text-white p-2 rounded-full shadow hover:bg-black transition">
          ✏️
        </button>
      </div>

      <h2 id="fullName" class="text-2xl font-bold text-gray-800 mb-1">---</h2>
      <p id="jobTitle" class="text-sm text-gray-500 mb-6">---</p>

      <div class="space-y-3 text-left mb-6">
        <a id="phoneBtn" href="#" class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
          📞 <span id="phoneText" class="text-gray-700 text-sm font-medium">---</span>
        </a>
        <a id="emailBtn" href="#" class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
          ✉️ <span id="emailText" class="text-gray-700 text-sm font-medium">---</span>
        </a>
        <a id="websiteBtn" href="#" target="_blank" class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition">
          🌐 <span id="websiteText" class="text-gray-700 text-sm font-medium">---</span>
        </a>
      </div>

      <div class="flex gap-2">
        <button onclick="alert('Contact Saved!')" class="flex-1 bg-pink-500 text-white font-bold py-3 rounded-xl shadow hover:bg-pink-600 transition">
          + Save Contact
        </button>
        <button onclick="navigator.clipboard.writeText(window.location.href); alert('Link copied!');" class="bg-gray-200 text-gray-700 font-bold px-4 rounded-xl hover:bg-gray-300 transition">
          Share
        </button>
      </div>
    </div>
  </div>

  <!-- PASSCODE MODAL -->
  <div id="passcodeModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white p-6 rounded-2xl w-full max-w-xs text-center shadow-2xl">
      <h3 class="font-bold text-lg mb-3">Enter Security PIN</h3>
      <input type="password" id="pinInput" placeholder="Enter PIN (e.g. 123456)" class="w-full border p-2 rounded-xl mb-4 text-center text-lg">
      <div class="flex gap-2">
        <button onclick="closePasscodeModal()" class="flex-1 bg-gray-200 py-2 rounded-xl font-semibold">Cancel</button>
        <button onclick="verifyPin()" class="flex-1 bg-black text-white py-2 rounded-xl font-semibold">Submit</button>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50 overflow-y-auto">
    <div class="bg-white p-6 rounded-2xl w-full max-w-md shadow-2xl space-y-4">
      <h3 class="font-bold text-xl text-gray-800">Edit Profile & Theme</h3>
      
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Full Name</label>
        <input type="text" id="editName" class="w-full border p-2 rounded-xl mt-1">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Phone</label>
        <input type="text" id="editPhone" class="w-full border p-2 rounded-xl mt-1">
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase">Theme Color</label>
        <select id="editTheme" class="w-full border p-2 rounded-xl mt-1">
          <option value="bg-gray-100">Default Gray</option>
          <option value="bg-pink-100">Pink Theme</option>
          <option value="bg-blue-100">Blue Theme</option>
          <option value="bg-emerald-100">Green Theme</option>
          <option value="bg-purple-100">Purple Theme</option>
        </select>
      </div>

      <div class="flex gap-2 pt-2">
        <button onclick="closeEditModal()" class="flex-1 bg-gray-200 py-2.5 rounded-xl font-semibold">Cancel</button>
        <button onclick="saveProfile()" class="flex-1 bg-pink-500 text-white py-2.5 rounded-xl font-bold hover:bg-pink-600 transition">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    // 1. SUPABASE INITIALIZATION
    const SUPABASE_URL = "https://rehsynbkacvjttjedlxr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_PjdxXTNrQ6sDsC7zZ9UFNA_127f9a123"; // Gagamitin ang bagong Key format
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentCardData = null;

    // 2. FETCH CARD DATA
    async function loadCard() {
      const urlParams = new URLSearchParams(window.location.search);
      let cardId = urlParams.get('id');

      try {
        let query = _supabase.from('cards').select('*');
        
        if (cardId) {
          query = query.eq('id', cardId);
        } else {
          // Kung walang ID sa URL, kukunin 'yung unang card sa table bilang fallback!
          query = query.limit(1);
        }

        const { data, error } = await query;

        if (error) throw error;

        if (data && data.length > 0) {
          currentCardData = data[0];
          renderUI(currentCardData);
        } else {
          document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Card not found in database.</p>`;
        }
      } catch (err) {
        console.error("Fetch Error:", err);
        document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Error Loading Card<br><span class="text-xs font-normal">${err.message || err}</span></p>`;
      }
    }

    // 3. RENDER UI
    function renderUI(card) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('cardContent').classList.remove('hidden');

      document.getElementById('fullName').innerText = card.full_name || 'No Name';
      document.getElementById('jobTitle').innerText = card.job_title || 'Digital Card Holder';
      document.getElementById('phoneText').innerText = card.phone || 'N/A';
      document.getElementById('emailText').innerText = card.email || 'N/A';
      document.getElementById('websiteText').innerText = card.website || 'N/A';

      if (card.avatar_url) {
        document.getElementById('avatar').src = card.avatar_url;
      }

      // Apply Background Theme
      if (card.theme) {
        document.body.className = `${card.theme} font-sans min-h-screen flex items-center justify-center p-4 transition-colors duration-500`;
      }
    }

    // 4. MODAL CONTROLS
    function openPasscodeModal() {
      document.getElementById('passcodeModal').classList.remove('hidden');
    }
    function closePasscodeModal() {
      document.getElementById('passcodeModal').classList.add('hidden');
      document.getElementById('pinInput').value = '';
    }
    function closeEditModal() {
      document.getElementById('editModal').classList.add('hidden');
    }

    function verifyPin() {
      const pin = document.getElementById('pinInput').value;
      const correctPin = currentCardData?.pin || "123456";

      if (pin === correctPin) {
        closePasscodeModal();
        // Populate edit modal fields
        document.getElementById('editName').value = currentCardData.full_name || '';
        document.getElementById('editPhone').value = currentCardData.phone || '';
        document.getElementById('editTheme').value = currentCardData.theme || 'bg-gray-100';
        document.getElementById('editModal').classList.remove('hidden');
      } else {
        alert("Incorrect PIN!");
      }
    }

    // 5. SAVE PROFILE TO SUPABASE
    async function saveProfile() {
      const newName = document.getElementById('editName').value;
      const newPhone = document.getElementById('editPhone').value;
      const newTheme = document.getElementById('editTheme').value;

      try {
        const { error } = await _supabase
          .from('cards')
          .update({ 
            full_name: newName, 
            phone: newPhone,
            theme: newTheme 
          })
          .eq('id', currentCardData.id);

        if (error) throw error;

        alert("Card Updated Successfully!");
        location.reload();
      } catch (err) {
        alert("Failed to save: " + err.message);
      }
    }

    // Start application
    window.addEventListener('DOMContentLoaded', loadCard);
  </script>
</body>
</html>
