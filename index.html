<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital NFC Business Card</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@600&family=Cinzel:wght@600;700&family=Great+Vibes&family=Inter:wght@400;600;700&family=Montserrat:wght@500;700;800&family=Oswald:wght@500;700&family=Pacifico&family=Playfair+Display:ital,wght@0,600;1,400&family=Quicksand:wght@500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* Girly Fonts */
    .font-quicksand { font-family: 'Quicksand', sans-serif; }
    .font-pacifico { font-family: 'Pacifico', cursive; }
    .font-greatvibes { font-family: 'Great Vibes', cursive; }
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-caveat { font-family: 'Caveat', cursive; }

    /* Men / Masculine Fonts */
    .font-montserrat { font-family: 'Montserrat', sans-serif; }
    .font-oswald { font-family: 'Oswald', sans-serif; }
    .font-robotomono { font-family: 'Roboto Mono', monospace; }
    .font-anton { font-family: 'Anton', sans-serif; }
    .font-cinzel { font-family: 'Cinzel', serif; }
    
    /* Modern Default */
    .font-inter { font-family: 'Inter', sans-serif; }

    /* Color Themes */
    .theme-skyblue   { --bg-body: #0b192c; --bg-card: #1e293b; --accent: #38bdf8; --accent-hover: #0284c7; }
    .theme-black     { --bg-body: #000000; --bg-card: #121212; --accent: #ffffff; --accent-hover: #d1d5db; }
    .theme-gray      { --bg-body: #18181b; --bg-card: #27272a; --accent: #a1a1aa; --accent-hover: #71717a; }
    .theme-pink      { --bg-body: #2a121d; --bg-card: #3b1c2b; --accent: #f472b6; --accent-hover: #ec4899; }
    .theme-yellow    { --bg-body: #1c1917; --bg-card: #292524; --accent: #facc15; --accent-hover: #eab308; }
    .theme-plum      { --bg-body: #18091e; --bg-card: #281033; --accent: #c084fc; --accent-hover: #a855f7; }
    .theme-darkgreen { --bg-body: #022c22; --bg-card: #064e3b; --accent: #34d399; --accent-hover: #10b981; }
    .theme-orange    { --bg-body: #1c0d02; --bg-card: #2e1605; --accent: #fb923c; --accent-hover: #f97316; }
    .theme-maroon    { --bg-body: #1f0909; --bg-card: #341212; --accent: #f87171; --accent-hover: #ef4444; }
    .theme-beige     { --bg-body: #1c1917; --bg-card: #2b2623; --accent: #f59e0b; --accent-hover: #d97706; }

    body { background-color: var(--bg-body); }
    .card-bg { background-color: var(--bg-card); }
    .btn-accent { background-color: var(--accent); }
    .btn-accent:hover { background-color: var(--accent-hover); }
    .text-accent { color: var(--accent); }
  </style>
</head>
<body id="bodyTag" class="theme-skyblue font-inter text-slate-100 min-h-screen flex flex-col justify-center items-center p-4 transition-colors duration-300">

  <!-- Main Card Container -->
  <div class="w-full max-w-md card-bg border border-slate-800 rounded-3xl shadow-2xl overflow-hidden relative my-8 transition-colors duration-300">
    
    <!-- Cover Photo -->
    <div class="h-36 relative bg-slate-800">
      <img id="coverImg" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800" alt="Cover" class="w-full h-full object-cover">
    </div>

    <!-- Profile Header Section -->
    <div class="px-6 pb-6 relative text-center">
      <!-- Profile Picture -->
      <div class="relative -mt-16 mb-4 inline-block">
        <img id="avatarImg" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400" alt="Avatar" class="w-28 h-28 rounded-full border-4 border-slate-900 object-cover shadow-lg mx-auto">
      </div>

      <h1 id="displayName" class="text-2xl font-bold text-white">Alex Rivera</h1>
      <p id="displayTitle" class="text-sm font-medium text-accent mt-1">Creative Director & Web Developer</p>
      <p id="displayBio" class="text-xs text-slate-400 mt-2 px-4">Building sleek digital experiences & web solutions.</p>

      <!-- Action Buttons -->
      <div class="grid grid-cols-2 gap-3 mt-6">
        <button onclick="downloadVCard()" class="btn-accent flex items-center justify-center gap-2 text-slate-950 font-bold py-2.5 px-4 rounded-xl shadow-lg transition-all active:scale-95 text-sm">
          <i class="fa-solid fa-user-plus"></i>
          <span>Save Contact</span>
        </button>
        <button onclick="shareCard()" class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-semibold py-2.5 px-4 rounded-xl transition-all active:scale-95 text-sm">
          <i class="fa-solid fa-share-nodes"></i>
          <span>Share</span>
        </button>
      </div>

      <!-- Quick Social Icons Row -->
      <div class="flex justify-center items-center gap-4 mt-6" id="socialBar">
        <a id="linkFacebook" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700 text-blue-500 flex items-center justify-center border border-slate-700 transition">
          <i class="fa-brands fa-facebook-f text-lg"></i>
        </a>
        <a id="linkInstagram" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700 text-pink-500 flex items-center justify-center border border-slate-700 transition">
          <i class="fa-brands fa-instagram text-lg"></i>
        </a>
        <a id="linkWhatsapp" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700 text-green-500 flex items-center justify-center border border-slate-700 transition">
          <i class="fa-brands fa-whatsapp text-lg"></i>
        </a>
        <a id="linkWechat" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full bg-slate-800 hover:bg-slate-700 text-emerald-400 flex items-center justify-center border border-slate-700 transition">
          <i class="fa-brands fa-weixin text-lg"></i>
        </a>
      </div>

      <!-- Primary Contact Links -->
      <div class="mt-4 space-y-3 text-left">
        <a id="linkPhone" href="tel:+1234567890" class="flex items-center gap-4 p-3 rounded-2xl bg-slate-800/40 border border-slate-800 hover:border-slate-700 transition">
          <div class="w-10 h-10 rounded-xl bg-slate-800 text-accent flex items-center justify-center">
            <i class="fa-solid fa-phone"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-slate-400 font-medium">Phone</p>
            <p id="displayPhone" class="text-sm font-semibold text-slate-200 truncate">+1 (234) 567-890</p>
          </div>
        </a>

        <a id="linkEmail" href="mailto:alex@example.com" class="flex items-center gap-4 p-3 rounded-2xl bg-slate-800/40 border border-slate-800 hover:border-slate-700 transition">
          <div class="w-10 h-10 rounded-xl bg-slate-800 text-accent flex items-center justify-center">
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-slate-400 font-medium">Email</p>
            <p id="displayEmail" class="text-sm font-semibold text-slate-200 truncate">alex@example.com</p>
          </div>
        </a>

        <a id="linkWebsite" href="https://example.com" target="_blank" rel="noopener noreferrer" class="flex items-center gap-4 p-3 rounded-2xl bg-slate-800/40 border border-slate-800 hover:border-slate-700 transition">
          <div class="w-10 h-10 rounded-xl bg-slate-800 text-accent flex items-center justify-center">
            <i class="fa-solid fa-globe"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-slate-400 font-medium">Website</p>
            <p id="displayWebsite" class="text-sm font-semibold text-slate-200 truncate">https://example.com</p>
          </div>
        </a>
      </div>
    </div>

    <!-- Floating Edit Button -->
    <button onclick="toggleModal(true)" class="absolute top-3 right-3 bg-slate-900/80 backdrop-blur-md border border-slate-700 text-slate-300 hover:text-white p-2.5 rounded-full shadow-md transition active:scale-95">
      <i class="fa-solid fa-pen text-xs"></i>
    </button>
  </div>

  <!-- Edit Profile Modal -->
  <div id="editModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex justify-center items-center p-4 z-50">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl p-6 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <h3 class="text-lg font-bold text-white">Edit Profile & Links</h3>
        <button onclick="toggleModal(false)" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>

      <div class="space-y-3">
        <!-- Theme & Font Selection -->
        <div class="grid grid-cols-2 gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
          <div>
            <label class="text-xs text-slate-400 block mb-1">Color Theme</label>
            <select id="selectTheme" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white">
              <option value="theme-skyblue">Sky Blue</option>
              <option value="theme-black">Black (Onyx)</option>
              <option value="theme-gray">Slate Gray</option>
              <option value="theme-pink">Pastel Pink</option>
              <option value="theme-yellow">Yellow Gold</option>
              <option value="theme-plum">Plum Purple</option>
              <option value="theme-darkgreen">Dark Green</option>
              <option value="theme-orange">Vibrant Orange</option>
              <option value="theme-maroon">Deep Maroon</option>
              <option value="theme-beige">Warm Beige</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-400 block mb-1">Font Style</label>
            <select id="selectFont" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white">
              <optgroup label="Girly / Chic Fonts">
                <option value="font-quicksand">Quicksand (Cute & Soft)</option>
                <option value="font-pacifico">Pacifico (Fun Script)</option>
                <option value="font-greatvibes">Great Vibes (Calligraphy)</option>
                <option value="font-playfair">Playfair (Elegant Chic)</option>
                <option value="font-caveat">Caveat (Handwritten)</option>
              </optgroup>
              <optgroup label="Men / Bold Fonts">
                <option value="font-montserrat">Montserrat (Modern Bold)</option>
                <option value="font-oswald">Oswald (Strong Condensed)</option>
                <option value="font-robotomono">Roboto Mono (Tech Clean)</option>
                <option value="font-anton">Anton (Heavy Impact)</option>
                <option value="font-cinzel">Cinzel (Executive Serif)</option>
              </optgroup>
              <optgroup label="Standard">
                <option value="font-inter">Inter (Clean Modern)</option>
              </optgroup>
            </select>
          </div>
        </div>

        <!-- Image Uploads -->
        <div>
          <label class="text-xs text-slate-400">Profile Photo (Upload File)</label>
          <input type="file" id="fileAvatar" accept="image/*" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-slate-300 file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-slate-700 file:text-xs file:text-white">
        </div>

        <div>
          <label class="text-xs text-slate-400">Cover Photo (Upload File)</label>
          <input type="file" id="fileCover" accept="image/*" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-slate-300 file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-slate-700 file:text-xs file:text-white">
        </div>

        <hr class="border-slate-800">

        <!-- Info Inputs -->
        <div>
          <label class="text-xs text-slate-400">Full Name</label>
          <input type="text" id="inputName" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Title / Occupation</label>
          <input type="text" id="inputTitle" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Bio</label>
          <input type="text" id="inputBio" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Phone</label>
          <input type="text" id="inputPhone" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Email</label>
          <input type="email" id="inputEmail" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Website URL</label>
          <input type="text" id="inputWebsite" placeholder="e.g. google.com" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>

        <hr class="border-slate-800">
        <p class="text-xs font-semibold text-slate-300">Social Media Links</p>

        <div>
          <label class="text-xs text-slate-400">Facebook URL</label>
          <input type="text" id="inputFacebook" placeholder="facebook.com/yourprofile" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Instagram URL</label>
          <input type="text" id="inputInstagram" placeholder="instagram.com/yourhandle" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">WhatsApp Number or Link</label>
          <input type="text" id="inputWhatsapp" placeholder="+1234567890" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">WeChat ID or Link</label>
          <input type="text" id="inputWechat" placeholder="Your WeChat ID" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
      </div>

      <div class="pt-2 flex justify-end gap-2">
        <button onclick="toggleModal(false)" class="px-4 py-2 text-xs font-semibold text-slate-400 hover:text-white">Cancel</button>
        <button id="saveBtn" onclick="saveProfile()" class="px-4 py-2 btn-accent text-slate-950 text-xs font-bold rounded-lg shadow">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    const defaultData = {
      name: 'Alex Rivera',
      title: 'Creative Director & Web Developer',
      bio: 'Building sleek digital experiences & web solutions.',
      phone: '+1 (234) 567-890',
      email: 'alex@example.com',
      website: 'https://example.com',
      facebook: 'https://facebook.com',
      instagram: 'https://instagram.com',
      whatsapp: '+1234567890',
      wechat: 'wechat_id',
      avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400',
      cover: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800',
      theme: 'theme-skyblue',
      font: 'font-inter'
    };

    // Helper: Auto-formats URLs so they don't break/404 on external links
    function fixUrl(url) {
      if (!url || url.trim() === '') return '#';
      let cleanUrl = url.trim();
      if (!cleanUrl.startsWith('http://') && !cleanUrl.startsWith('https://')) {
        cleanUrl = 'https://' + cleanUrl;
      }
      return cleanUrl;
    }

    function loadProfile() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      
      document.getElementById('displayName').innerText = data.name;
      document.getElementById('displayTitle').innerText = data.title;
      document.getElementById('displayBio').innerText = data.bio;
      document.getElementById('displayPhone').innerText = data.phone;
      document.getElementById('displayEmail').innerText = data.email;
      document.getElementById('displayWebsite').innerText = data.website || 'https://example.com';
      document.getElementById('avatarImg').src = data.avatar;
      document.getElementById('coverImg').src = data.cover || defaultData.cover;

      document.getElementById('linkPhone').href = 'tel:' + data.phone;
      document.getElementById('linkEmail').href = 'mailto:' + data.email;
      document.getElementById('linkWebsite').href = fixUrl(data.website);

      // Social Links Setup
      document.getElementById('linkFacebook').href = fixUrl(data.facebook);
      document.getElementById('linkInstagram').href = fixUrl(data.instagram);

      // WhatsApp Handler
      if (data.whatsapp) {
        const cleanWa = data.whatsapp.replace(/[^0-9]/g, '');
        document.getElementById('linkWhatsapp').href = cleanWa ? `https://wa.me/${cleanWa}` : fixUrl(data.whatsapp);
      } else {
        document.getElementById('linkWhatsapp').href = '#';
      }

      // WeChat Handler
      if (data.wechat) {
        document.getElementById('linkWechat').href = data.wechat.startsWith('http') ? data.wechat : `weixin://dl/chat?${data.wechat}`;
      } else {
        document.getElementById('linkWechat').href = '#';
      }

      // Apply Theme & Font
      const body = document.getElementById('bodyTag');
      body.className = `${data.theme || 'theme-skyblue'} ${data.font || 'font-inter'} text-slate-100 min-h-screen flex flex-col justify-center items-center p-4 transition-colors duration-300`;
    }

    function toggleModal(show) {
      const modal = document.getElementById('editModal');
      if (show) {
        const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
        document.getElementById('inputName').value = data.name;
        document.getElementById('inputTitle').value = data.title;
        document.getElementById('inputBio').value = data.bio;
        document.getElementById('inputPhone').value = data.phone;
        document.getElementById('inputEmail').value = data.email;
        document.getElementById('inputWebsite').value = data.website || '';
        document.getElementById('inputFacebook').value = data.facebook || '';
        document.getElementById('inputInstagram').value = data.instagram || '';
        document.getElementById('inputWhatsapp').value = data.whatsapp || '';
        document.getElementById('inputWechat').value = data.wechat || '';
        document.getElementById('selectTheme').value = data.theme || 'theme-skyblue';
        document.getElementById('selectFont').value = data.font || 'font-inter';
        
        document.getElementById('fileAvatar').value = '';
        document.getElementById('fileCover').value = '';

        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }

    function compressImage(file, maxWidth = 500, quality = 0.75) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    }

    async function saveProfile() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.innerText = 'Saving...';
      saveBtn.disabled = true;

      try {
        const currentData = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;

        const avatarFile = document.getElementById('fileAvatar').files[0];
        const coverFile = document.getElementById('fileCover').files[0];

        let newAvatar = currentData.avatar;
        let newCover = currentData.cover;

        if (avatarFile) {
          newAvatar = await compressImage(avatarFile, 400, 0.8);
        }
        if (coverFile) {
          newCover = await compressImage(coverFile, 800, 0.75);
        }

        const updatedData = {
          name: document.getElementById('inputName').value,
          title: document.getElementById('inputTitle').value,
          bio: document.getElementById('inputBio').value,
          phone: document.getElementById('inputPhone').value,
          email: document.getElementById('inputEmail').value,
          website: document.getElementById('inputWebsite').value,
          facebook: document.getElementById('inputFacebook').value,
          instagram: document.getElementById('inputInstagram').value,
          whatsapp: document.getElementById('inputWhatsapp').value,
          wechat: document.getElementById('inputWechat').value,
          avatar: newAvatar,
          cover: newCover,
          theme: document.getElementById('selectTheme').value,
          font: document.getElementById('selectFont').value
        };

        localStorage.setItem('nfcCardData', JSON.stringify(updatedData));
        loadProfile();
        toggleModal(false);
      } catch (err) {
        alert('An error occurred while saving. Please try again!');
        console.error(err);
      } finally {
        saveBtn.innerText = 'Save Changes';
        saveBtn.disabled = false;
      }
    }

    function downloadVCard() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      const vcardData = `BEGIN:VCARD\nVERSION:3.0\nFN:${data.name}\nTITLE:${data.title}\nTEL;TYPE=CELL:${data.phone}\nEMAIL:${data.email}\nURL:${fixUrl(data.website)}\nEND:VCARD`;

      const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', `${data.name.replace(/\s+/g, '_')}_contact.vcf`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    async function shareCard() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      if (navigator.share) {
        try {
          await navigator.share({
            title: data.name,
            text: `${data.name} - ${data.title}`,
            url: window.location.href
          });
        } catch (err) {}
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    }

    loadProfile();
  </script>
</body>
</html>
