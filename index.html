<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital NFC Business Card</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts (20+ Sosyal & Elegant Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Allura&family=Anton&family=Bebas+Neue&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..700;1,6..96,400..700&family=Caveat:wght@600&family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Great+Vibes&family=Inter:wght@400;600;700&family=Italianno&family=Lora:ital,wght@0,500;1,400&family=Montserrat:wght@500;700;800&family=Oswald:wght@500;700&family=Pacifico&family=Parisienne&family=Playfair+Display:ital,wght@0,600;1,400&family=Prata&family=Quicksand:wght@500;700&family=Roboto+Mono:wght@500;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">

  <style>
    /* --- GIRLY / ELEGANT / SOSYAL FONTS --- */
    .font-quicksand { font-family: 'Quicksand', sans-serif; }
    .font-pacifico { font-family: 'Pacifico', cursive; }
    .font-greatvibes { font-family: 'Great Vibes', cursive; }
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-caveat { font-family: 'Caveat', cursive; }
    .font-parisienne { font-family: 'Parisienne', cursive; }
    .font-alexbrush { font-family: 'Alex Brush', cursive; }
    .font-cormorant { font-family: 'Cormorant Garamond', serif; }
    .font-bodoni { font-family: 'Bodoni Moda', serif; }
    .font-allura { font-family: 'Allura', cursive; }

    /* --- MEN / EXECUTIVE / BOLD FONTS --- */
    .font-montserrat { font-family: 'Montserrat', sans-serif; }
    .font-oswald { font-family: 'Oswald', sans-serif; }
    .font-robotomono { font-family: 'Roboto Mono', monospace; }
    .font-anton { font-family: 'Anton', sans-serif; }
    .font-cinzel { font-family: 'Cinzel', serif; }
    .font-bebas { font-family: 'Bebas Neue', sans-serif; }
    .font-syne { font-family: 'Syne', sans-serif; }
    .font-prata { font-family: 'Prata', serif; }
    .font-lora { font-family: 'Lora', serif; }
    .font-inter { font-family: 'Inter', sans-serif; }

    /* --- COLOR THEMES WITH SOFT CARD TINTS --- */
    .theme-pink {
      --bg-body: #fce7f3; --bg-card: linear-gradient(180deg, #ffffff 0%, #fdf2f8 100%); 
      --text-main: #831843; --text-sub: #be185d; --accent: #ec4899; 
      --card-border: #fbcfe8; --blob-1: #f472b6; --blob-2: #fbcfe8; --icon-bg: #fce7f3;
    }
    .theme-skyblue {
      --bg-body: #e0f2fe; --bg-card: linear-gradient(180deg, #ffffff 0%, #f0f9ff 100%); 
      --text-main: #0c4a6e; --text-sub: #0284c7; --accent: #0284c7; 
      --card-border: #bae6fd; --blob-1: #38bdf8; --blob-2: #bae6fd; --icon-bg: #e0f2fe;
    }
    .theme-beige {
      --bg-body: #fef3c7; --bg-card: linear-gradient(180deg, #ffffff 0%, #fffbeb 100%); 
      --text-main: #451a03; --text-sub: #b45309; --accent: #d97706; 
      --card-border: #fde68a; --blob-1: #fbbf24; --blob-2: #fef3c7; --icon-bg: #fef3c7;
    }
    .theme-yellow {
      --bg-body: #fef9c3; --bg-card: linear-gradient(180deg, #ffffff 0%, #fefce8 100%); 
      --text-main: #713f12; --text-sub: #ca8a04; --accent: #eab308; 
      --card-border: #fef08a; --blob-1: #facc15; --blob-2: #fef08a; --icon-bg: #fef9c3;
    }
    .theme-plum {
      --bg-body: #f3e8ff; --bg-card: linear-gradient(180deg, #ffffff 0%, #faf5ff 100%); 
      --text-main: #581c87; --text-sub: #7e22ce; --accent: #9333ea; 
      --card-border: #e9d5ff; --blob-1: #c084fc; --blob-2: #f3e8ff; --icon-bg: #f3e8ff;
    }
    .theme-black {
      --bg-body: #000000; --bg-card: linear-gradient(180deg, #18181b 0%, #09090b 100%); 
      --text-main: #ffffff; --text-sub: #a1a1aa; --accent: #ffffff; 
      --card-border: #27272a; --blob-1: #27272a; --blob-2: #09090b; --icon-bg: #27272a;
    }
    .theme-gray {
      --bg-body: #18181b; --bg-card: linear-gradient(180deg, #27272a 0%, #18181b 100%); 
      --text-main: #f4f4f5; --text-sub: #a1a1aa; --accent: #a1a1aa; 
      --card-border: #3f3f46; --blob-1: #3f3f46; --blob-2: #18181b; --icon-bg: #3f3f46;
    }
    .theme-darkgreen {
      --bg-body: #022c22; --bg-card: linear-gradient(180deg, #064e3b 0%, #022c22 100%); 
      --text-main: #ecfdf5; --text-sub: #6ee7b7; --accent: #10b981; 
      --card-border: #047857; --blob-1: #059669; --blob-2: #022c22; --icon-bg: #065f46;
    }
    .theme-orange {
      --bg-body: #fff7ed; --bg-card: linear-gradient(180deg, #ffffff 0%, #fff7ed 100%); 
      --text-main: #7c2d12; --text-sub: #ea580c; --accent: #f97316; 
      --card-border: #ffedd5; --blob-1: #fdba74; --blob-2: #ffedd5; --icon-bg: #ffedd5;
    }
    .theme-maroon {
      --bg-body: #1f0909; --bg-card: linear-gradient(180deg, #341212 0%, #1f0909 100%); 
      --text-main: #fef2f2; --text-sub: #fca5a5; --accent: #ef4444; 
      --card-border: #451a1a; --blob-1: #991b1b; --blob-2: #1f0909; --icon-bg: #451a1a;
    }

    body { background-color: var(--bg-body); color: var(--text-main); }
    .card-bg { background: var(--bg-card); border-color: var(--card-border); }
    .btn-accent { background-color: var(--accent); color: #ffffff; }
    .btn-accent:hover { filter: brightness(0.9); }
    .text-accent { color: var(--accent); }
    .text-sub { color: var(--text-sub); }
    .text-main { color: var(--text-main); }
    .icon-box { background-color: var(--icon-bg); color: var(--accent); }

    /* Animated Organic Background Blobs */
    .blob {
      position: absolute;
      filter: blur(60px);
      opacity: 0.65;
      border-radius: 50%;
      z-index: 0;
      animation: float 8s infinite alternate ease-in-out;
    }
    .blob-1 { background-color: var(--blob-1); width: 300px; height: 300px; top: -50px; left: -50px; }
    .blob-2 { background-color: var(--blob-2); width: 280px; height: 280px; bottom: -50px; right: -50px; animation-delay: -4s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.1); }
    }
  </style>
</head>
<body id="bodyTag" class="theme-plum font-parisienne min-h-screen w-full flex justify-center items-center p-4 transition-colors duration-500 relative overflow-x-hidden">

  <!-- Background Decorative Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Main Card Container (Guaranteed Center Alignment) -->
  <div class="w-full max-w-md card-bg border rounded-3xl shadow-2xl overflow-hidden relative my-auto mx-auto z-10 transition-colors duration-300">
    
    <!-- Cover Photo -->
    <div class="h-36 relative bg-slate-200 dark:bg-slate-800">
      <img id="coverImg" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800" alt="Cover" class="w-full h-full object-cover">
    </div>

    <!-- Profile Header Section -->
    <div class="px-6 pb-6 relative text-center">
      <!-- Profile Picture -->
      <div class="relative -mt-16 mb-4 inline-block">
        <img id="avatarImg" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400" alt="Avatar" class="w-28 h-28 rounded-full border-4 border-white shadow-lg mx-auto object-cover">
      </div>

      <h1 id="displayName" class="text-2xl font-bold text-main">Rose Anne Perez</h1>
      <p id="displayTitle" class="text-sm font-semibold text-accent mt-1">Digital Creator</p>
      <p id="displayBio" class="text-xs text-sub mt-2 px-4">Crafting nfc</p>

      <!-- Action Buttons -->
      <div class="grid grid-cols-2 gap-3 mt-6">
        <button onclick="downloadVCard()" class="btn-accent flex items-center justify-center gap-2 font-bold py-2.5 px-4 rounded-xl shadow-md transition-all active:scale-95 text-sm">
          <i class="fa-solid fa-user-plus"></i>
          <span>Save Contact</span>
        </button>
        <button onclick="shareCard()" class="flex items-center justify-center gap-2 bg-white/80 text-main border border-slate-300 dark:border-slate-700 font-semibold py-2.5 px-4 rounded-xl transition-all active:scale-95 text-sm shadow-sm">
          <i class="fa-solid fa-share-nodes"></i>
          <span>Share</span>
        </button>
      </div>

      <!-- Quick Social Icons Row -->
      <div class="flex justify-center items-center gap-4 mt-6" id="socialBar">
        <a id="linkFacebook" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full icon-box hover:scale-110 flex items-center justify-center border border-slate-200 dark:border-slate-800 transition shadow-sm">
          <i class="fa-brands fa-facebook-f text-lg"></i>
        </a>
        <a id="linkInstagram" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full icon-box hover:scale-110 flex items-center justify-center border border-slate-200 dark:border-slate-800 transition shadow-sm">
          <i class="fa-brands fa-instagram text-lg"></i>
        </a>
        <a id="linkWhatsapp" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full icon-box hover:scale-110 flex items-center justify-center border border-slate-200 dark:border-slate-800 transition shadow-sm">
          <i class="fa-brands fa-whatsapp text-lg"></i>
        </a>
        <a id="linkWechat" href="#" target="_blank" rel="noopener noreferrer" class="w-10 h-10 rounded-full icon-box hover:scale-110 flex items-center justify-center border border-slate-200 dark:border-slate-800 transition shadow-sm">
          <i class="fa-brands fa-weixin text-lg"></i>
        </a>
      </div>

      <!-- Primary Contact Links -->
      <div class="mt-4 space-y-3 text-left">
        <a id="linkPhone" href="tel:+1234567890" class="flex items-center gap-4 p-3 rounded-2xl icon-box border border-slate-200/60 dark:border-slate-800 hover:opacity-90 transition shadow-sm">
          <div class="w-10 h-10 rounded-xl icon-box flex items-center justify-center">
            <i class="fa-solid fa-phone"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-sub font-medium">Phone</p>
            <p id="displayPhone" class="text-sm font-semibold text-main truncate">+1 (234) 567-890</p>
          </div>
        </a>

        <a id="linkEmail" href="mailto:alex@example.com" class="flex items-center gap-4 p-3 rounded-2xl icon-box border border-slate-200/60 dark:border-slate-800 hover:opacity-90 transition shadow-sm">
          <div class="w-10 h-10 rounded-xl icon-box flex items-center justify-center">
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-sub font-medium">Email</p>
            <p id="displayEmail" class="text-sm font-semibold text-main truncate">alex@example.com</p>
          </div>
        </a>

        <a id="linkWebsite" href="https://example.com" target="_blank" rel="noopener noreferrer" class="flex items-center gap-4 p-3 rounded-2xl icon-box border border-slate-200/60 dark:border-slate-800 hover:opacity-90 transition shadow-sm">
          <div class="w-10 h-10 rounded-xl icon-box flex items-center justify-center">
            <i class="fa-solid fa-globe"></i>
          </div>
          <div class="overflow-hidden">
            <p class="text-xs text-sub font-medium">Website</p>
            <p id="displayWebsite" class="text-sm font-semibold text-main truncate">https://example.com</p>
          </div>
        </a>
      </div>
    </div>

    <!-- Floating Edit Button -->
    <button onclick="toggleModal(true)" class="absolute top-3 right-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:scale-105 p-2.5 rounded-full shadow-md transition active:scale-95">
      <i class="fa-solid fa-pen text-xs"></i>
    </button>
  </div>

  <!-- Edit Profile Modal -->
  <div id="editModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex justify-center items-center p-4 z-50">
    <div class="bg-slate-900 border border-slate-800 text-slate-100 w-full max-w-md rounded-2xl p-6 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b border-slate-800 pb-3">
        <h3 class="text-lg font-bold text-white">Edit Profile & Style</h3>
        <button onclick="toggleModal(false)" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>

      <div class="space-y-3">
        <!-- Theme & Font Selection -->
        <div class="grid grid-cols-2 gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800">
          <div>
            <label class="text-xs text-slate-400 block mb-1">Color Theme</label>
            <select id="selectTheme" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white">
              <option value="theme-plum">Plum Purple (Chic Tint)</option>
              <option value="theme-pink">Pastel Pink (Aesthetic Tint)</option>
              <option value="theme-skyblue">Sky Blue (Fresh Tint)</option>
              <option value="theme-beige">Warm Beige (Nude Tint)</option>
              <option value="theme-yellow">Yellow Gold (Warm Tint)</option>
              <option value="theme-black">Pure Black (Dark Onyx)</option>
              <option value="theme-gray">Slate Gray (Modern)</option>
              <option value="theme-darkgreen">Dark Green (Emerald)</option>
              <option value="theme-orange">Vibrant Orange</option>
              <option value="theme-maroon">Deep Maroon</option>
            </select>
          </div>
          <div>
            <label class="text-xs text-slate-400 block mb-1">Font Style</label>
            <select id="selectFont" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-white">
              <optgroup label="Girly & Sosyal Fonts (10)">
                <option value="font-parisienne">Parisienne (Sosyal Script)</option>
                <option value="font-alexbrush">Alex Brush (Calligraphy)</option>
                <option value="font-cormorant">Cormorant (High Fashion)</option>
                <option value="font-bodoni">Bodoni Moda (Vogue Style)</option>
                <option value="font-allura">Allura (Elegant Flow)</option>
                <option value="font-quicksand">Quicksand (Cute Soft)</option>
                <option value="font-pacifico">Pacifico (Fun Chic)</option>
                <option value="font-greatvibes">Great Vibes (Classic)</option>
                <option value="font-playfair">Playfair (Luxury Serif)</option>
                <option value="font-caveat">Caveat (Handwritten)</option>
              </optgroup>
              <optgroup label="Men & Bold Fonts (10)">
                <option value="font-bebas">Bebas Neue (Tall Bold)</option>
                <option value="font-syne">Syne (Executive Modern)</option>
                <option value="font-prata">Prata (Executive Serif)</option>
                <option value="font-lora">Lora (Sophisticated)</option>
                <option value="font-montserrat">Montserrat (Clean Bold)</option>
                <option value="font-oswald">Oswald (Strong Impact)</option>
                <option value="font-robotomono">Roboto Mono (Tech)</option>
                <option value="font-anton">Anton (Heavy Punch)</option>
                <option value="font-cinzel">Cinzel (Roman Luxe)</option>
                <option value="font-inter">Inter (Clean Standard)</option>
              </optgroup>
            </select>
          </div>
        </div>

        <!-- Image Uploads -->
        <div>
          <label class="text-xs text-slate-400">Profile Photo (Upload File)</label>
          <input type="file" id="fileAvatar" accept="image/*" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-slate-300 file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-slate-700 file:text-xs file:text-white">
        </div>

        <div>
          <label class="text-xs text-slate-400">Cover Photo (Upload File)</label>
          <input type="file" id="fileCover" accept="image/*" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs text-slate-300 file:mr-3 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-slate-700 file:text-xs file:text-white">
        </div>

        <hr class="border-slate-800">

        <!-- Info Inputs -->
        <div>
          <label class="text-xs text-slate-400">Full Name</label>
          <input type="text" id="inputName" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Title / Occupation</label>
          <input type="text" id="inputTitle" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Bio</label>
          <input type="text" id="inputBio" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Phone</label>
          <input type="text" id="inputPhone" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Email</label>
          <input type="email" id="inputEmail" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Website URL</label>
          <input type="text" id="inputWebsite" placeholder="e.g. google.com" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>

        <hr class="border-slate-800">
        <p class="text-xs font-semibold text-slate-300">Social Media Links</p>

        <div>
          <label class="text-xs text-slate-400">Facebook URL</label>
          <input type="text" id="inputFacebook" placeholder="facebook.com/yourprofile" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">Instagram URL</label>
          <input type="text" id="inputInstagram" placeholder="instagram.com/yourhandle" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">WhatsApp Number or Link</label>
          <input type="text" id="inputWhatsapp" placeholder="+1234567890" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
        <div>
          <label class="text-xs text-slate-400">WeChat ID or Link</label>
          <input type="text" id="inputWechat" placeholder="Your WeChat ID" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none">
        </div>
      </div>

      <div class="pt-2 flex justify-end gap-2">
        <button onclick="toggleModal(false)" class="px-4 py-2 text-xs font-semibold text-slate-400 hover:text-white">Cancel</button>
        <button id="saveBtn" onclick="saveProfile()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold rounded-lg shadow">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    const defaultData = {
      name: 'Rose Anne Perez',
      title: 'Digital Creator',
      bio: 'Crafting nfc',
      phone: '09606099421',
      email: 'krizzialester@gmail.com',
      website: 'ziadigital.store/zialink',
      facebook: '',
      instagram: '',
      whatsapp: '',
      wechat: '',
      avatar: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400',
      cover: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800',
      theme: 'theme-plum',
      font: 'font-parisienne'
    };

    function fixUrl(url) {
      if (!url || url.trim() === '') return '#';
      let cleanUrl = url.trim();
      if (!cleanUrl.startsWith('http://') && !cleanUrl.startsWith('https://')) {
        cleanUrl = 'https://' + cleanUrl;
      }
      return cleanUrl;
    }

    function loadProfile() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      
      document.getElementById('displayName').innerText = data.name;
      document.getElementById('displayTitle').innerText = data.title;
      document.getElementById('displayBio').innerText = data.bio;
      document.getElementById('displayPhone').innerText = data.phone;
      document.getElementById('displayEmail').innerText = data.email;
      document.getElementById('displayWebsite').innerText = data.website || 'https://example.com';
      document.getElementById('avatarImg').src = data.avatar;
      document.getElementById('coverImg').src = data.cover || defaultData.cover;

      document.getElementById('linkPhone').href = 'tel:' + data.phone;
      document.getElementById('linkEmail').href = 'mailto:' + data.email;
      document.getElementById('linkWebsite').href = fixUrl(data.website);

      // Social Links
      document.getElementById('linkFacebook').href = fixUrl(data.facebook);
      document.getElementById('linkInstagram').href = fixUrl(data.instagram);

      if (data.whatsapp) {
        const cleanWa = data.whatsapp.replace(/[^0-9]/g, '');
        document.getElementById('linkWhatsapp').href = cleanWa ? `https://wa.me/${cleanWa}` : fixUrl(data.whatsapp);
      } else {
        document.getElementById('linkWhatsapp').href = '#';
      }

      if (data.wechat) {
        document.getElementById('linkWechat').href = data.wechat.startsWith('http') ? data.wechat : `weixin://dl/chat?${data.wechat}`;
      } else {
        document.getElementById('linkWechat').href = '#';
      }

      // Apply Dynamic Theme & Font Classes
      const body = document.getElementById('bodyTag');
      body.className = `${data.theme || 'theme-plum'} ${data.font || 'font-parisienne'} min-h-screen w-full flex justify-center items-center p-4 transition-colors duration-500 relative overflow-x-hidden`;
    }

    function toggleModal(show) {
      const modal = document.getElementById('editModal');
      if (show) {
        const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
        document.getElementById('inputName').value = data.name;
        document.getElementById('inputTitle').value = data.title;
        document.getElementById('inputBio').value = data.bio;
        document.getElementById('inputPhone').value = data.phone;
        document.getElementById('inputEmail').value = data.email;
        document.getElementById('inputWebsite').value = data.website || '';
        document.getElementById('inputFacebook').value = data.facebook || '';
        document.getElementById('inputInstagram').value = data.instagram || '';
        document.getElementById('inputWhatsapp').value = data.whatsapp || '';
        document.getElementById('inputWechat').value = data.wechat || '';
        document.getElementById('selectTheme').value = data.theme || 'theme-plum';
        document.getElementById('selectFont').value = data.font || 'font-parisienne';
        
        document.getElementById('fileAvatar').value = '';
        document.getElementById('fileCover').value = '';

        modal.classList.remove('hidden');
      } else {
        modal.classList.add('hidden');
      }
    }

    function compressImage(file, maxWidth = 500, quality = 0.75) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = (err) => reject(err);
        };
        reader.onerror = (err) => reject(err);
      });
    }

    async function saveProfile() {
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.innerText = 'Saving...';
      saveBtn.disabled = true;

      try {
        const currentData = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;

        const avatarFile = document.getElementById('fileAvatar').files[0];
        const coverFile = document.getElementById('fileCover').files[0];

        let newAvatar = currentData.avatar;
        let newCover = currentData.cover;

        if (avatarFile) {
          newAvatar = await compressImage(avatarFile, 400, 0.8);
        }
        if (coverFile) {
          newCover = await compressImage(coverFile, 800, 0.75);
        }

        const updatedData = {
          name: document.getElementById('inputName').value,
          title: document.getElementById('inputTitle').value,
          bio: document.getElementById('inputBio').value,
          phone: document.getElementById('inputPhone').value,
          email: document.getElementById('inputEmail').value,
          website: document.getElementById('inputWebsite').value,
          facebook: document.getElementById('inputFacebook').value,
          instagram: document.getElementById('inputInstagram').value,
          whatsapp: document.getElementById('inputWhatsapp').value,
          wechat: document.getElementById('inputWechat').value,
          avatar: newAvatar,
          cover: newCover,
          theme: document.getElementById('selectTheme').value,
          font: document.getElementById('selectFont').value
        };

        localStorage.setItem('nfcCardData', JSON.stringify(updatedData));
        loadProfile();
        toggleModal(false);
      } catch (err) {
        alert('An error occurred while saving. Please try again!');
        console.error(err);
      } finally {
        saveBtn.innerText = 'Save Changes';
        saveBtn.disabled = false;
      }
    }

    function downloadVCard() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      const vcardData = `BEGIN:VCARD\nVERSION:3.0\nFN:${data.name}\nTITLE:${data.title}\nTEL;TYPE=CELL:${data.phone}\nEMAIL:${data.email}\nURL:${fixUrl(data.website)}\nEND:VCARD`;

      const blob = new Blob([vcardData], { type: 'text/vcard;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.setAttribute('download', `${data.name.replace(/\s+/g, '_')}_contact.vcf`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    async function shareCard() {
      const data = JSON.parse(localStorage.getItem('nfcCardData')) || defaultData;
      if (navigator.share) {
        try {
          await navigator.share({
            title: data.name,
            text: `${data.name} - ${data.title}`,
            url: window.location.href
          });
        } catch (err) {}
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    }

    loadProfile();
  </script>
</body>
